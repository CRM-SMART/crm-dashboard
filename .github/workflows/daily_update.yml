name: "Automacao Dashboard GA4"

on:
  schedule:
    # Rodar às 09:00 BRT (12:00 UTC) e 14:00 BRT (17:00 UTC)
    - cron: '0 12,17 * * *'
  workflow_dispatch: # Permite rodar o script manualmente clicando em um botão no GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  atualizar_dados_e_publicar:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install google-analytics-data

      - name: Criar arquivo de credenciais
        run: |
          echo '${{ secrets.GA4_CREDENTIALS }}' > agente-guanabara-16ba36a165a7.json

      - name: Rodar script de atualização
        run: python update_ga4.py

      - name: Commit e Push das alterações
        run: |
          git config --global user.name "Robo Dashboard"
          git config --global user.email "robo@dashboard.com"
          git add dados_dashboard.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "⚙️ Auto-update: Extraindo dados atualizados do GA4"
          git push origin main

      - name: Configurar Pages
        uses: actions/configure-pages@v4
        
      - name: Subir arquivos para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
